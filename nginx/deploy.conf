# deploy-webhook location — 由 nginx 反向代理保护
# 置于主 nginx.conf 的 http {} 块内，或 include 到主配置中

# 仅允许特定 headers 的请求
map $http_x_deploy_secret $deploy_denied {
    default 1;
    # 实际值在 nginx.conf 中覆盖，此处仅作占位
    "" 1;
}

server {
    listen 80;
    server_name deploy.example.test;

    location / {
        # 简单试探就返回 404，不暴露任何信息
        if ($http_x_deploy_secret = "") {
            return 404;
        }
        proxy_pass http://127.0.0.1:19090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Deploy-Secret $http_x_deploy_secret;
        proxy_read_timeout 120s;
    }
}
